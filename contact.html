<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - MUWOWO ELECTRONICS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

    <header class="site-header">... (same header) ...</header>

    <main>
        <div class="page-header"><h1>Contact Us</h1><p>Get in touch with us</p></div>
        <div class="contact-container">
            <div class="contact-info-grid">
                <div class="contact-card"><i class="fas fa-phone-alt"></i><h3>Phone</h3><p><a href="tel:+260761616201">+260 761 616 201</a></p></div>
                <div class="contact-card"><i class="fab fa-whatsapp"></i><h3>WhatsApp</h3><p><a href="https://wa.me/260761616201">+260 761 616 201</a></p></div>
                <div class="contact-card"><i class="fas fa-map-marker-alt"></i><h3>Location</h3><p>Lusaka, Zambia</p></div>
                <div class="contact-card"><i class="fas fa-clock"></i><h3>Hours</h3><p>Mon-Sat: 9am - 6pm<br>Sunday: Closed</p></div>
            </div>
            <div class="contact-form"><h2>Send us a message</h2><form id="contactForm"><input type="text" id="name" placeholder="Your Name" required><input type="email" id="email" placeholder="Your Email" required><textarea id="message" rows="5" placeholder="Your Message" required></textarea><button type="submit">Send Message</button></form><div id="formSuccess" class="form-success">Message sent! We'll reply within 24 hours.</div></div>
        </div>
    </main>

    <!-- footer -->
    <script src="script.js"></script>
</body>
</html>
